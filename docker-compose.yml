version: "3.9"

services:
  # FastAPI ML API
  api:
    build: .
    container_name: credit_risk_api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - PYTHONPATH=/app
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src/config:/app/src/config

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: credit_risk_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - MONGO_URI=mongodb://mongodb:27017/
    depends_on:
      - api
    restart: unless-stopped

  # MongoDB
  mongodb:
    image: mongo:6.0
    container_name: credit_risk_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
